<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-site-verification" content="a4rqQj4oyND-oxb34p6udGxQP1TH8BghuR46QS21Urg" />

  <title>Sarthak Roy | DPS Patna Student</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion/dist/framer-motion.umd.js"></script>
  
  <style>
    :root {
      scroll-behavior: smooth;
      --bg-dark: linear-gradient(135deg, #020617, #0f172a, #1e293b);
      --bg-light: #f2f2f2;
      --card-dark: rgba(15, 23, 42, 0.75);
      --card-light: #e5e5e5;
      --text-dark: #e5e7eb;
      --text-light: #1f2937;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: var(--bg-dark);
      color: var(--text-dark);
      transition: all 0.3s ease;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body.light {
      background: var(--bg-light);
      color: var(--text-light);
    }

    .container {
      display: flex;
      align-items: flex-start;
      gap: 24px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
      padding-top: 100px;  /* Space for fixed top navbar */
      box-sizing: border-box;
    }

    .card {
      background: var(--card-dark);
      backdrop-filter: blur(10px);
      border-radius: 22px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      transition: all 0.3s ease;
      width: 100%;
      box-sizing: border-box;
      max-width: 1000px;
    }

    body.light .card {
      background: var(--card-light);
    }

    /* FIXED TOP NAVBAR - Beautiful buttons, active highlight, follows your theme */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--card-dark);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      z-index: 1000;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: all 0.3s ease;
    }

    body.light .navbar {
      background: var(--card-light);
      border-bottom-color: rgba(0, 0, 0, 0.15);
    }

    .navbar .toggle {
      padding: 10px 20px;
      border-radius: 25px;
      background: rgba(229, 231, 235, 0.25);
      color: var(--text-dark);
      font-weight: 600;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
      min-width: 80px;
      text-align: center;
    }

    body.light .navbar .toggle {
      background: rgba(31, 41, 55, 0.25);
      color: var(--text-light);
    }

    .navbar .toggle:hover {
      background: rgba(229, 231, 235, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      border-color: rgba(255, 255, 255, 0.4);
    }

    body.light .navbar .toggle:hover {
      background: rgba(31, 41, 55, 0.5);
    }

    /* Active state with shimmer */
    .navbar .toggle.active {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: white !important;
      box-shadow: 0 12px 40px rgba(59, 130, 246, 0.5);
      transform: scale(1.05);
      border-color: #60a5fa;
    }

    .navbar .toggle.active::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    /* ORIGINAL SIDEBAR RESTORED EXACTLY */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: sticky;
      top: 24px;
      height: auto;
      width: 150px;
      order: 2;
    }

    .sidebar .toggle {
      display: block;
      margin: 4px 0;
      padding: 6px 10px;
      border-radius: 8px;
      background: #e5e7eb;
      color: #020617;
      font-weight: bold;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s ease;
    }

    .sidebar .toggle:hover {
      background: #d1d5db;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      opacity: 0.8;
      margin-bottom: 20px;
      text-align: center;
    }

    h2 {
      margin-top: 28px;
      margin-bottom: 12px;
    }

    p {
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .grid-item {
      background: rgba(255, 255, 255, 0.1);
      padding: 10px;
      border-radius: 10px;
      font-size: 0.95rem;
    }

    body.light .grid-item {
      background: #d4d4d4;
    }

    .pGrid-item {
      background: rgba(255, 255, 255, 0.1);
      padding: 10px;
      border-radius: 10px;
      font-size: 0.95rem;
      max-width: 80px;
    }

    body.light .pGrid-item {
      background: #d4d4d4;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-actions button, .footer-actions a {
      margin: 6px 0;
      padding: 8px 14px;
      border-radius: 10px;
      background: #e5e7eb;
      color: #020617;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    .footer-actions button:hover, .footer-actions a:hover {
      background: #d1d5db;
    }

    @media (max-width: 900px) {
      .container {
        flex-direction: column;
        align-items: center;
      }

      .sidebar {
        width: 100%;
        order: 1;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
      }

      .sidebar .toggle {
        margin: 4px 6px;
      }

      .navbar {
        flex-wrap: wrap;
        gap: 6px;
        padding: 10px 16px;
      }

      .navbar .toggle {
        padding: 8px 16px;
        font-size: 0.85rem;
        min-width: 70px;
      }

      .code-orb {
        position: fixed;
        right: 24px;
        top: 50%;
        transform: translateY(-50%);
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: radial-gradient(circle at top left, #38bdf8, #1e40af);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        font-family: monospace;
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        cursor: pointer;
        z-index: 999;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    function App() {
      const [light, setLight] = React.useState(false);

      React.useEffect(() => {
        document.body.classList.toggle("light", light);
      }, [light]);

      // Active nav highlighting for top navbar
      React.useEffect(() => {
        const sections = ['home', 'about', 'work', 'projects', 'contact'];
        const toggles = document.querySelectorAll('.navbar .toggle');
        
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const activeId = entry.target.getAttribute('id');
              toggles.forEach((toggle, index) => {
                toggle.classList.toggle('active', sections[index] === activeId);
              });
            }
          });
        }, { threshold: 0.3, rootMargin: '-20% 0px -40% 0px' });

        sections.forEach(id => {
          const section = document.getElementById(id);
          if (section) observer.observe(section);
        });

        return () => observer.disconnect();
      }, []);

      return (
        <div className="container" id="home">
          {/* FIXED TOP NAVBAR */}
          <nav className="navbar">
            <a className="toggle" href="#home">Home</a>
            <a className="toggle" href="#about">About</a>
            <a className="toggle" href="#work">Work</a>
            <a className="toggle" href="#projects">Projects</a>
            <a className="toggle" href="#contact">Contact</a>
          </nav>

          <div className="card">
            <header>
              <h1>Sarthak Roy</h1>
              <p className="subtitle">Student · Python Developer · Robotics Enthusiast</p>
            </header>

            <section id="about">
              <h2>About Me</h2>
              <p>I am a student at Delhi Public School Patna who is deeply interested in technology and computers. I enjoy learning how software works, how machines think, and how code can be used to solve real problems. I started with Python and slowly expanded my interests into robotics and Javascript development.</p>
              <p>I believe learning should be practical and curiosity-driven. I like experimenting, fixing errors, and asking a important question 'why'. My long-term goal is to become a skilled software and robotics engineer.</p>
            </section>
            
            <section id="education">
                <h2>Education</h2>
                <div className="grid">
                <div className="grid-item">
                    <strong>School:</strong> Delhi Public School, Patna
                </div>
                <div className="grid-item">
                  <strong>Class:</strong> 7
                </div>
                  <div className="grid-item">
                  <strong>Board:</strong> CBSE
                </div>
                  <div className="grid-item">
              <strong>Focus Areas:</strong> Mathematics, Mental Abilities, Science
            </div>
            <div className="grid-item">
              <strong>Academics:</strong><br></br> Class 5: 98.33%<br></br>Class 6: 98.6%
            </div>
        </div>
        </section>

            <section id="work">
              <h2>What I Work On</h2>
              <div className="grid">
                <div className="grid-item">🐍 Python Programming – AI Related concepts - NN, CNN and basic functionality</div>
                <div className="grid-item">🌐 Web Development – HTML, CSS, JS Basics</div>
                <div className="grid-item">🧠 Problem Solving – algorithms and logical thinking</div>
                <div className="grid-item">📘 Learning AI & ML – beginner concepts</div>
              </div>
            </section>

            <section id="family">
              <h2>Family Background</h2>
              <p>
                I was born and brought up in <strong>Patna, Bihar</strong>, where I am spending my childhood and educating myself to become more knowledge filled. While I grew up in Patna, my family's ancestral roots belong to <strong>Arah, Bhojpur district, Bihar</strong>, which forms an important part of our heritage and values.
              </p>
              <p>
                My father, <strong>Dr. Sanjay Kumar Roy, MBBS, DNB</strong>, is a doctor at <strong>Paras HMRI Hospital</strong> and has always emphasized discipline, dedication, and service to society. My mother, <strong>Kumari Anuradha</strong>, was a botany teacher by profession and now works as a lecturer at <strong>D.I.E.T, Dighi, Vaishali</strong>, contributing significantly to academic development and mentoring other educators. My elder sister, <strong>Ankita Roy</strong>, is academically driven and is determined to pursue a career in medicine and become a doctor.
              </p>
              <p>
                Growing up in such an education-oriented and supportive family environment has shaped my curiosity, work ethic, and interest in learning. The values of hard work, consistency, and continuous improvement that I learned at home strongly influence my approach to technology, studies, and personal growth.
              </p>
            </section>

            <section id="projects"> 
              <h2>Projects & Learning</h2>
              <div className="grid">
                <div className="grid-item">📂 Python Practice Projects</div>
                <div className="grid-item">🧪 Logic & Algorithm Experiments [Basics]</div>
                <div className="grid-item">Javascript Basics [Backend Development will be studied]</div>
              </div>
            </section>

            <section id="contact">
              <h2>Contact & Socials</h2>
              <div className="grid">
                <div className="grid-item"><strong>Email:</strong> p-2066-19@dpspatna.com</div>
                <div className="grid-item"><strong>GitHub:</strong> github.com/SarthakRoy77</div>
              </div>
            </section>

            <footer className="footer">
              <span>© {new Date().getFullYear()} Sarthak Roy</span>
              <div className="footer-actions">
                <button onClick={() => setLight(!light)}>Toggle Light</button>
                <a className="github-link" href="https://github.com/SarthakRoy77" target="_blank" rel="noreferrer">GitHub</a>
              </div>
            </footer>
          </div>

          {/* ORIGINAL SIDEBAR RESTORED 100% */}
          <div className="card sidebar">
            <h2 className="personal-title">About Me</h2>
            <div className="grid">
              <div className="pGrid-item"><strong>Name:</strong> Sarthak Roy</div>
              <div className="pGrid-item"><strong>Age:</strong> 12</div>
              <div className="pGrid-item"><strong>Class:</strong> 7</div>
              <div className="pGrid-item"><strong>School:</strong> Delhi Public School Patna</div>
              <div className="pGrid-item"><strong>Skills:</strong> Python, HTML, CSS, JS </div>
              <div className="pGrid-item"><strong>Interests:</strong> Robotics, Football, Anime</div>
              <div className="pGrid-item"><strong>Goal:</strong> Software & Robotics Engineer</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
